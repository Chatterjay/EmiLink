name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build -Pmod_version=${{ github.ref_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emilink
          path: build/libs/*.jar

  release:
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: emilink
          path: build/libs/

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          JAR=$(ls build/libs/*.jar | grep -v sources | grep -v javadoc | head -1)
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "EmiLink ${{ github.ref_name }}" \
            --notes "" \
            "$JAR"
